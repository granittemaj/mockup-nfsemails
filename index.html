<style>
:root{--nfs:#F5821F;--ink:#141210;--ink2:#403A33;--paper:#FCFAF6;--muted:#857C70;--line:#E8E1D4;--band:#F3EEE5;--disp:'Playfair Display',Georgia,serif;--body:'Source Serif 4',Georgia,serif;}
*{box-sizing:border-box;}
body{margin:0;font-family:var(--body);color:var(--ink);background:var(--band);height:100vh;overflow:hidden;}
.app{display:grid;grid-template-columns:300px 1fr;height:100vh;}
.side{background:var(--paper);border-right:1px solid var(--line);display:flex;flex-direction:column;height:100vh;}
.brand{padding:22px 22px 16px;border-bottom:1px solid var(--line);}
.brand img{height:26px;display:block;}
.brand .sub{font-size:12px;color:var(--muted);margin-top:10px;letter-spacing:.5px;}
.list{overflow-y:auto;padding:10px;flex:1;}
.grp{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);padding:16px 12px 6px;font-weight:600;}
.item{padding:12px 12px;border-radius:10px;cursor:pointer;transition:background .15s;}
.item:hover{background:var(--band);}
.item.active{background:var(--ink);}
.item.active .nm{color:var(--paper);} .item.active .ds{color:#cfc8bd;}
.nm{font-family:var(--disp);font-size:17px;font-weight:600;color:var(--ink);}
.ds{font-size:12px;color:var(--muted);margin-top:3px;line-height:1.4;}
.main{display:flex;flex-direction:column;height:100vh;overflow:hidden;}
.bar{display:flex;align-items:center;gap:14px;padding:16px 24px;border-bottom:1px solid var(--line);background:var(--paper);flex-wrap:wrap;}
.bar h1{font-family:var(--disp);font-size:20px;margin:0;font-weight:700;}
.subj{font-size:13px;color:var(--muted);}
.subj b{color:var(--ink2);font-weight:600;}
.spacer{flex:1;}
.toggle{display:inline-flex;background:var(--band);border:1px solid var(--line);border-radius:40px;padding:3px;}
.toggle button{border:0;background:transparent;font-family:var(--body);font-size:13px;color:var(--muted);padding:7px 16px;border-radius:40px;cursor:pointer;font-weight:600;}
.toggle button.on{background:var(--ink);color:var(--paper);}
.copy{border:0;background:var(--nfs);color:#fff;font-family:var(--disp);font-style:italic;font-weight:600;font-size:14px;padding:9px 20px;border-radius:40px;cursor:pointer;}
.copy.done{background:#16A34A;}
.stage{flex:1;overflow-y:auto;overflow-x:hidden;display:flex;justify-content:center;padding:0;background:var(--band);}
.device{transition:width .3s ease;width:720px;max-width:100%;align-self:flex-start;}
.device.mobile{width:390px;}
.frame{background:transparent;}
iframe{width:100%;border:0;display:block;background:var(--band);}
.hamb{display:none;flex-direction:column;justify-content:center;border:0;background:transparent;cursor:pointer;padding:8px 6px;margin-right:2px;}
.hamb span{display:block;width:22px;height:2px;background:var(--ink);margin:3px 0;border-radius:2px;}
.backdrop{display:none;position:fixed;inset:0;background:rgba(20,18,16,.42);z-index:40;}
.backdrop.show{display:block;}
@media(max-width:820px){
.app{grid-template-columns:1fr;}
.side{position:fixed;top:0;left:0;width:300px;max-width:84vw;height:100vh;z-index:50;transform:translateX(-100%);transition:transform .28s ease;box-shadow:0 0 50px rgba(0,0,0,.2);}
.side.open{transform:translateX(0);}
.hamb{display:inline-flex;}
.bar h1{font-size:18px;}
.subj{display:none;}
}
</style></head>

fing &middot; Issue 42<\/td><\/tr><\/table><\/td><\/tr><tr><td class=\"px\" style=\"padding:48px 40px 0 40px;\"><div class=\"body\" style=\"font-size:13px;letter-spacing:2px;text-transform:uppercase;color:#F5821F;font-weight:600;\">\u2014 Week of June 23<\/div>\n<h1 class=\"disp h1\" style=\"margin:14px 0 0 0;font-size:40px;line-height:46px;font-weight:700;color:#141210;\">This week on the <span style=\"font-style:italic;\">frontlines<\/span><\/h1>\n<p class=\"body\" style=\"margin:18px 0 0 0;font-size:18px;line-height:30px;color:#403A33;\">Five new stories from the 33 countries where we work, from a seized scam compound in Cambodia to a greener future taking root in Argentina.<\/p><\/td><\/tr><tr><td class=\"px\" style=\"padding:32px 40px 0 40px;\">\n<img src=\"https://picsum.photos/seed/nfs-roundup-1/1040/520\" width=\"520\" alt=\"\" style=\"display:block;width:100%;max-width:520px;height:auto;border-radius:12px;\">\n<div class=\"body\" style=\"margin:16px 0 0 0;font-size:12px;letter-spacing:1.5px;text-transform:uppercase;color:#C46F49;font-weight:600;\">Human Trafficking<\/div>\n<h3 class=\"disp\" style=\"margin:8px 0 0 0;font-size:23px;line-height:29px;font-weight:600;color:#141210;\">Inside a seized scam compound in Cambodia<\/h3>\n<p class=\"body\" style=\"margin:10px 0 0 0;font-size:16px;line-height:26px;color:#403A33;\">A tour near Cambodia's border with Thailand reveals how online fraud and human trafficking intersect.<\/p>\n<a href=\"#\" class=\"body\" style=\"display:inline-block;margin:12px 0 0 0;font-size:15px;font-weight:600;color:#F5821F;text-decoration:none;\">Read more &rarr;<\/a><\/td><\/tr><tr><td class=\"px\" style=\"padding:32px 40px 0 40px;\"><div style=\"border-top:1px solid #E8E1D4;\"><\/div><\/td><\/tr><tr><td class=\"px\" style=\"padding:32px 40px 0 40px;\">\n<img src=\"https://picsum.photos/seed/nfs-roundup-2/1040/520\" width=\"520\" alt=\"\" style=\"display:block;width:100%;max-width:520px;height:auto;border-radius:12px;\">\n<div class=\"body\" style=\"margin:16px 0 0 0;font-size:12px;letter-spacing:1.5px;text-transform:uppercase;color:#5B7747;font-weight:600;\">Ecocide<\/div>\n<h3 class=\"disp\" style=\"margin:8px 0 0 0;font-size:23px;line-height:29px;font-weight:600;color:#141210;\">Growing a greener future, one camera at a time<\/h3>\n<p class=\"body\" style=\"margin:10px 0 0 0;font-size:16px;line-height:26px;color:#403A33;\">Our partners launched a new tree-monitoring campaign across the restoration sites.<\/p>\n<a href=\"#\" class=\"body\" style=\"display:inline-block;margin:12px 0 0 0;font-size:15px;font-weight:600;color:#F5821F;text-decoration:none;\">Read more &rarr;<\/a><\/td><\/tr><tr><td class=\"px\" style=\"padding:32px 40px 0 40px;\"><div style=\"border-top:1px solid #E8E1D4;\"><\/div><\/td><\/tr><tr><td class=\"px\" style=\"padding:32px 40px 0 40px;\">\n<img src=\"https://picsum.photos/seed/nfs-roundup-3/1040/520\" width=\"520\" alt=\"\" style=\"display:block;width:100%;max-width:520px;height:auto;border-radius:12px;\">\n<div class=\"body\" style=\"margin:16px 0 0 0;font-size:12px;letter-spacing:1.5px;text-transform:uppercase;color:#4F8E92;font-weight:600;\">Social Innovation<\/div>\n<h3 class=\"disp\" style=\"margin:8px 0 0 0;font-size:23px;line-height:29px;font-weight:600;color:#141210;\">21,759 people reached in 2025<\/h3>\n<p class=\"body\" style=\"margin:10px 0 0 0;font-size:16px;line-height:26px;color:#403A33;\">In Uganda and the DRC, we connect communities through education and agriculture.<\/p>\n<a href=\"#\" class=\"body\" style=\"display:inline-block;margin:12px 0 0 0;font-size:15px;font-weight:600;color:#F5821F;text-decoration:none;\">Read more &rarr;<\/a><\/td><\/tr><tr><td style=\"padding:48px 0 0 0;\"><table role=\"presentation\" width=\"100%\" style=\"background:#F3EEE5;border-top:1px solid #E8E1D4;border-bottom:1px solid #E8E1D4;\"><tr><td class=\"px\" style=\"padding:32px 40px;\"><table role=\"presentation\" width=\"100%\"><tr><td class=\"stack sp\" width=\"33%\" align width=\"168\" height=\"29\" alt=\"Not For Sale\" style=\"display:block;width:168px;height:auto;border:0;\"><\/td>\n<td align=\"right\" valign=\"middle\" class=\"body\" style=\"font-size:13px;color:#857C70;\">Project Update<\/td><\/tr><\/table><\/td><\/tr><tr><td class=\"px\" style=\"padding:0;\"><img src=\"https://picsum.photos/seed/nfs-thailand/1200/560\" width=\"600\" alt=\"Thailand\" style=\"display:block;width:100%;height:auto;\"><\/td><\/tr>\n<tr><td class=\"px\" style=\"padding:40px 40px 0 40px;\"><div class=\"body\" style=\"font-size:13px;letter-spacing:2px;text-transform:uppercase;color:#F5821F;font-weight:600;\">\u2014 Thailand &middot; The Golden Triangle<\/div>\n<h1 class=\"disp h1\" style=\"margin:14px 0 0 0;font-size:38px;line-height:44px;font-weight:700;color:#141210;\">Protecting children where rivers meet<\/h1>\n<p class=\"body\" style=\"margin:20px 0 0 0;font-size:18px;line-height:30px;color:#403A33;\">Where Thailand, Myanmar, and Laos meet, families face a daily fight against trafficking. This quarter, our partners reached more families than ever before.<\/p><\/td><\/tr><tr><td style=\"padding:48px 0 0 0;\"><table role=\"presentation\" width=\"100%\" style=\"background:#F3EEE5;border-top:1px solid #E8E1D4;border-bottom:1px solid #E8E1D4;\"><tr><td class=\"px\" style=\"padding:32px 40px;\"><table role=\"presentation\" width=\"100%\"><tr><td class=\"stack sp\" width=\"33%\" align=\"center\" valign=\"top\"><div class=\"disp\" style=\"font-size:30px;font-weight:700;color:#141210;\">4,537<\/div><div class=\"body\" style=\"font-size:13px;color:#857C70;margin-top:6px;\">People supported<\/div><\/td><td class=\"stack sp\" width=\"33%\" align=\"center\" valign=\"top\"><div class=\"disp\" style=\"font-size:30px;font-weight:700;color:#141210;\">537<\/div><div class=\"body\" style=\"font-size:13px;color:#857C70;margin-top:6px;\">This quarter<\/div><\/td><td class=\"stack sp\" width=\"33%\" align=\"center\" valign=\"top\"><div class=\"disp\" style=\"font-size:3 const order = ["roundup", "project_update", "investigation", "impact", "project_appeal", "urgent", "event", "monthly_upgrade", "welcome", "thankyou", "recurring_welcome", "reengage"];
let current = order[0], view='desktop';
const list=document.getElementById('list'), frame=document.getElementById('frame');
function groups(){const g={};order.forEach(k=>{(g[TEMPLATES[k].group]=g[TEMPLATES[k].group]||[]).push(k);});return g;}
function renderList(){const g=groups();let h='';for(const grp in g){h+=`<div class="grp">${grp}</div>`;g[grp].forEach(k=>{const t=TEMPLATES[k];h+=`<div class="item ${k===current?'active':''}" data-k="${k}" onclick="select('${k}')"><div class="nm">${t.name}</div><div class="ds">${t.desc}</div></div>`;});}list.innerHTML=h;}
function sizeFrame(){try{const d=frame.contentDocument||frame.contentWindow.document;const h=Math.max(d.body.scrollHeight,d.documentElement.scrollHeight)+2;if(Math.abs(parseInt(frame.style.height||0)-h)>1)frame.style.height=h+'px';}catch(e){frame.style.height='1400px';}}
let ro;
function hookResize(){try{const d=frame.contentDocument;if(ro)ro.disconnect();ro=new ResizeObserver(()=>sizeFrame());ro.observe(d.documentElement);d.querySelectorAll('img').forEach(im=>{im.addEventListener('load',sizeFrame);im.addEventListener('error',sizeFrame);});}catch(e){}}
function select(k){current=k;const t=TEMPLATES[k];document.getElementById('tName').textContent=t.name;document.getElementById('tSubj').innerHTML='<b>Subject:</b> '+t.subject;const sample='Maria';const preview=t.html.split('{{ contact.FIRSTNAME | default : "friend" }}').join(sample).split('{{ contact.FIRSTNAME | default : "Friend" }}').join(sample);frame.srcdoc=preview;frame.onload=()=>{hookResize();sizeFrame();};document.querySelectorAll('.item').forEach(e=>e.classList.toggle('active',e.dataset.k===k));const b=document.getElementById('copyBtn');b.textContent='Copy HTML';b.classList.remove('done');closeNav();}
function setView(v){view=v;document.getElementById('device').classList.toggle('mobile',v==='mobile');document.getElementById('bDesk').classList.toggle('on',v==='desktop');document.getElementById('bMob').classList.toggle('on',v==='mobile');setTimeout(sizeFrame,340);}
function copyHtml(){navigator.clipboard.writeText(TEMPLATES[current].html).then(()=>{const b=document.getElementById('copyBtn');b.textContent='Copied ✓';b.classList.add('done');setTimeout(()=>{b.textContent='Copy HTML';b.classList.remove('done');},1800);});}
function toggleNav(){document.querySelector('.side').classList.toggle('open');document.getElementById('backdrop').classList.toggle('show');}
function closeNav(){document.querySelector('.side').classList.remove('open');document.getElementById('backdrop').classList.remove('show');}
renderList();select(current);
